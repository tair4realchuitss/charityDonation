<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a class="logo" (click)="goHome()">
        <div class="logo-mark">A</div>
        <div class="logo-text">Анчоусы</div>
      </a>

      <nav class="nav">
        <a routerLink="/">Home</a>
        <a routerLink="/">Projects</a>
        <a routerLink="/">Impact</a>
      </nav>

      <div class="header-actions">
        @if (!isLoggedIn) {
          <button class="btn btn-header-light" (click)="goLogin()">Sign In / Register</button>
        } @else {
          <div class="profile-container">
            <button class="btn btn-header-light" (click)="toggleMenu($event)">
              {{ profile?.username || 'User' }}
            </button>

            @if (showMenu) {
              <div class="profile-dropdown">
                <div class="dropdown-header">
                  <p>{{ profile?.username || 'User' }}</p>
                  <p>Balance: {{ profile?.balance ?? 0 }}</p>
                </div>

                <div class="dropdown-item" (click)="goProfile()">My Profile</div>
                <div class="dropdown-item" (click)="logout()">Logout</div>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>
