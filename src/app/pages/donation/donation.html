<section class="section">
  <div class="container">
    <div class="payment-modal-content" style="margin: 0 auto;">
      <div class="payment-badge">Secure Payment</div>
      <h2>Complete your donation</h2>
      <p class="payment-subtext">
        You are about to donate <strong>{{ amount | currency }}</strong>.
      </p>

      <div class="payment-form">
        <input [(ngModel)]="cardName" placeholder="Cardholder name" />
        <input [(ngModel)]="cardNumber" placeholder="Card number" />
        <div class="payment-row">
          <input [(ngModel)]="cardExpiry" placeholder="MM/YY" />
          <input [(ngModel)]="cardCvv" placeholder="CVV" />
        </div>

        <button class="btn btn-primary payment-submit-btn" (click)="confirm()">
          Pay {{ amount | currency }}
        </button>

        <button class="btn btn-light" (click)="goHome()">Back to Home</button>
      </div>
    </div>
  </div>
</section>
