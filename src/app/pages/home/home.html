<div class="home">

  <h2>Categories</h2>
  <div class="categories">
    @for (cat of categories; track cat) {
      <div class="category-card">{{ cat }}</div>
    }
  </div>

  <h2>Charities</h2>
  <div class="charities">

    @for (c of charities; track c.id) {

      <div class="card">

        <h3>{{ c.title }}</h3>
        <p>{{ c.description }}</p>

        <p>{{ c.current_amount }} / {{ c.goal_amount }}</p>

        <button (click)="openCharity(c.id)">View</button>
        <button (click)="donate(c.id)">Donate</button>

      </div>

    }

  </div>

</div>
