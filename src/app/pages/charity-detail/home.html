<h2>Charities</h2>

<input [(ngModel)]="search" placeholder="Search charity">
<button (click)="searchClick()">Search</button>

@for (charity of filtered; track charity.id) {
  <div class="card">
    <h3>{{ charity.name }}</h3>
    <p>{{ charity.description }}</p>
    <p>Raised: {{ charity.raised }} / {{ charity.goal }}</p>

    <button (click)="openCharity(charity.id)">View</button>
    <button [routerLink]="['/user', 1]">Owner</button>
  </div>
}
